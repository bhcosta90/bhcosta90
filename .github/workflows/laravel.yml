name: Laravel e Deploy

on:
  push:
    branches: [ "main", "sandbox", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with Extensions and Tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, openssl, pdo, tokenizer, xml, ctype, json, curl
          tools: composer

      - name: Copy .env if not exists
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Set Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch $DB_DATABASE

      - name: Run Tests (PHPUnit or Pest)
        run: composer ci

      # --- Steps de Deploy (Produção/Sandbox) ---
      - name: Set image name (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        run: |
          DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${{ github.ref_name }}"
          echo "IMAGE=$DOCKER_USER/$REPO:$TAG" >> $GITHUB_ENV

      - name: Update version.txt (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        run: |
          echo "${{ github.sha }}" | cut -c1-7 > version.txt
          date +" %Y-%m-%d %H:%M:%S" >> version.txt

      - name: Login to Docker Hub (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        uses: ./.github/actions/docker-build-push
        with:
          image_name: ${{ env.IMAGE }}
          push_latest: 'true'

      - name: Prepare server and setup environment (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            REPO="${{ github.event.repository.name }}"
            USER="${{ secrets.DOCKERHUB_USERNAME }}"
            IMAGE="$USER/$REPO:$BRANCH"

            echo "🚀 Preparing Deploy: $REPO-$BRANCH"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "$USER" --password-stdin
            docker pull "$IMAGE"
            docker image prune -a -f || true
            docker network inspect web >/dev/null 2>&1 || \
              docker network create --driver overlay web

            FINAL_ENV="$HOME/$REPO/.env-$BRANCH"
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
                if [ ! -f "$FINAL_ENV" ]; then
                    FINAL_ENV="$HOME/$REPO/.env-production"
                fi
            fi

            if [ ! -f "$FINAL_ENV" ]; then
              FINAL_ENV="$HOME/$REPO/.env"
            fi

            if [ ! -f "$FINAL_ENV" ]; then
              echo "❌ Nenhum arquivo .env encontrado em $HOME/$REPO/"
              exit 1
            fi
            echo "✅ Server prepared for $BRANCH"

      - name: Parse Replicas (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        id: replicas
        shell: bash
        run: |
          REPLICAS_CONFIG="main:1,sandbox:1"
          REPLICAS=1
          IFS=',' read -ra CONFIG_ARRAY <<< "$REPLICAS_CONFIG"
          for item in "${CONFIG_ARRAY[@]}"; do
            IFS=':' read -ra PAIR <<< "$item"
            if [[ "${PAIR[0]}" == "${{ github.ref_name }}" ]]; then
              REPLICAS="${PAIR[1]}"
              break
            fi
          done
          echo "count=$REPLICAS" >> $GITHUB_OUTPUT

      - name: Deploy Worker (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-worker
          image: ${{ env.IMAGE }}
          env_file: >-
            $HOME/${{ github.event.repository.name }}/.env-${{
            github.ref_name }}
          prefix: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-
          command: "worker"
          replicas: "1"

      - name: Deploy App (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-app
          image: ${{ env.IMAGE }}
          env_file: >-
            $HOME/${{ github.event.repository.name }}/.env-${{
            github.ref_name }}
          prefix: >-
            ${{ github.event.repository.name }}-${{ github.ref_name }}-
          replicas: ${{ steps.replicas.outputs.count }}

      - name: Finalize Deploy (Deploy)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'sandbox' || github.ref_name == 'develop')
        run: |
          REPO="${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          echo "✅ Deploy finalizado: $REPO-$BRANCH"

      # --- Steps de PR Deploy ---
      - name: Set environment variables (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        run: |
          BRANCH_NAME=$(echo "${{ github.head_ref }}" | sed 's/\//-/g')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}"
          REPO_NAME="${{ github.event.repository.name }}"
          echo "IMAGE=$IMAGE/$REPO_NAME:$BRANCH_NAME" >> $GITHUB_ENV
          DOMAIN_BASE="bhcosta90.dev.br:8080"
          DOMAIN="$BRANCH_NAME.preview.$DOMAIN_BASE"
          echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV

      - name: Update version.txt (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        run: |
          SHA=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
          echo "$SHA $(date +'%Y-%m-%d %H:%M:%S')" > version.txt

      - name: Login to Docker Hub (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        uses: ./.github/actions/docker-build-push
        with:
          image_name: ${{ env.IMAGE }}

      - name: Setup environment and prepare server (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          script: |
            set -e
            BRANCH="${{ env.BRANCH_NAME }}"
            REPO="${{ github.event.repository.name }}"
            USER="${{ secrets.DOCKERHUB_USERNAME }}"
            IMAGE="$USER/$REPO:$BRANCH"

            echo "🚀 Preparing PR Deploy: $REPO-$BRANCH"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "$USER" --password-stdin
            docker pull "$IMAGE"
            docker network inspect web >/dev/null 2>&1 || \
              docker network create web

            ENV_DIR="$HOME/${REPO}"
            mkdir -p "$ENV_DIR"

            if [ -n "${{ secrets.ENV }}" ]; then
              echo "📝 Gerando arquivo de env específico para PR: \
                $ENV_DIR/.env-$BRANCH"
              echo "${{ secrets.ENV }}" > "$ENV_DIR/.env-$BRANCH"
            fi

            FINAL_ENV="$ENV_DIR/.env-$BRANCH"
            if [ ! -f "$FINAL_ENV" ]; then
              FINAL_ENV="$ENV_DIR/.env"
            fi

            if [ ! -f "$FINAL_ENV" ]; then
              echo "❌ Nenhum arquivo .env encontrado em $ENV_DIR!"
              exit 1
            fi
            echo "FINAL_ENV=$FINAL_ENV" > .env_path_tmp

      - name: Deploy Worker (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: >-
            ${{ github.event.repository.name }}-${{ env.BRANCH_NAME }}-worker
          image: ${{ env.IMAGE }}
          env_file: >-
            $HOME/${{ github.event.repository.name }}/.env-${{
            env.BRANCH_NAME }}
          prefix: >-
            ${{ github.event.repository.name }}-${{ env.BRANCH_NAME }}-
          command: "worker"
          replicas: "1"

      - name: Deploy App (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: >-
            ${{ github.event.repository.name }}-${{ env.BRANCH_NAME }}-app
          image: ${{ env.IMAGE }}
          env_file: >-
            $HOME/${{ github.event.repository.name }}/.env-${{
            env.BRANCH_NAME }}
          prefix: >-
            ${{ github.event.repository.name }}-${{ env.BRANCH_NAME }}-
          replicas: "1"

      - name: Update Caddy (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          (github.event.action == 'opened' || github.event.action == 'synchronize')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            REPO="${{ github.event.repository.name }}"
            BRANCH="${{ env.BRANCH_NAME }}"
            APP_NAME="$REPO-$BRANCH"
            DOMAIN_BASE="bhcosta90.dev.br:8080"
            DOMAIN="http://${{ env.BRANCH_NAME }}.preview.$DOMAIN_BASE"
            CADDYFILE="$HOME/CaddyfilePreview"

            if ! grep -q "$DOMAIN" "$CADDYFILE"; then
              echo "$DOMAIN {" >> "$CADDYFILE"
              echo "        reverse_proxy $APP_NAME-app:80" >> "$CADDYFILE"
              echo "}" >> "$CADDYFILE"
              docker service update --force caddy-preview || true
            fi
            echo "✅ PR Deploy finalizado: $APP_NAME no domínio $DOMAIN"

      - name: Comment on PR (PR Deploy)
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const domain = "${{ env.DOMAIN }}";
            const message = `🚀 **Preview Environment Available!**

            The deploy of your branch has been successfully completed.
            🔗 Link: [http://${domain}](http://${domain})

            _This environment will be automatically removed when the PR \
            is closed or after 24h of inactivity._`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })

  deploy-pr-cleanup:
    name: PR Cleanup
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      DOMAIN_BASE: bhcosta90.dev.br:8080
    steps:
      - name: Set branch name (sanitized)
        run: |
          BRANCH_NAME=$(echo "${{ github.head_ref }}" | sed 's/\//-/g')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Cleanup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            BRANCH="${{ env.BRANCH_NAME }}"
            REPO="${{ github.event.repository.name }}"
            APP_NAME="$REPO-$BRANCH"
            DOMAIN="$BRANCH.preview.${{ env.DOMAIN_BASE }}"
            CADDYFILE="$HOME/CaddyfilePreview"
            USER="${{ secrets.DOCKERHUB_USERNAME }}"
            IMAGE="$USER/$REPO:$BRANCH"

            echo "🧹 Cleaning up $APP_NAME..."

            # Remover serviços (Swarm)
            docker service rm "$APP_NAME-app" "$APP_NAME-worker" \
              >/dev/null 2>&1 || true

            # Remover imagem
            docker rmi "$IMAGE" >/dev/null 2>&1 || true

            # Remover do Caddyfile
            sed -i "/$DOMAIN {/,/}/d" "$CADDYFILE"
            docker service update --force caddy-preview || true

            echo "✅ Cleanup finalizado para $APP_NAME"

      - name: Delete image tag from Docker Hub
        run: |
          LOGIN_DATA='{"username": "${{ secrets.DOCKERHUB_USERNAME }}", \
            "password": "${{ secrets.DOCKERHUB_TOKEN }}"}'
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d "$LOGIN_DATA" https://hub.docker.com/v2/users/login/ | \
            jq -r .token)

          if [ "$TOKEN" != "null" ]; then
            echo "🗑️ Deletando tag $BRANCH_NAME do Docker Hub..."
            USER_NAME="${{ secrets.DOCKERHUB_USERNAME }}"
            REPO_NAME="${{ github.event.repository.name }}"
            REPO_PATH="$USER_NAME/$REPO_NAME"
            curl -s -X DELETE -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/$REPO_PATH/tags/$BRANCH_NAME/"
            echo "✅ Tag removida com sucesso (ou já não existia)."
          else
            echo "❌ Falha ao obter token do Docker Hub. \
              Verifique as credenciais."
          fi