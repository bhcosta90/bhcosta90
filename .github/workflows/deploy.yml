name: Deploy

on:
  push:
    branches: [main, sandbox, develop]

  pull_request:
    branches: [main, sandbox, develop]

env:
  PROTECTED_BRANCHES: '["main", "sandbox", "develop"]'
  REPLICAS_CONFIG: "main:3,sandbox:2"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env
        with:
          ref_name: ${{ github.ref_name }}
          repo_name: ${{ github.event.repository.name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          sha: ${{ github.sha }}

      - name: Docker Setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        uses: ./.github/actions/build-push-image
        with:
          image: ${{ env.IMAGE }}
          image_latest: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:latest

      - name: Prepare Server Environment
        uses: ./.github/actions/prepare-server-env
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ env.IMAGE }}
          repo_name: ${{ env.REPO_NAME }}
          branch_name: ${{ env.BRANCH_NAME }}

      - name: Resolve Replicas
        run: |
          REPLICAS=1
          IFS=',' read -ra CONFIG_ARRAY <<< "${{ env.REPLICAS_CONFIG }}"
          for item in "${CONFIG_ARRAY[@]}"; do
            IFS=':' read -ra PAIR <<< "$item"
            if [[ "${PAIR[0]}" == "${{ env.BRANCH_NAME }}" ]]; then
              REPLICAS="${PAIR[1]}"
              break
            fi
          done
          echo "REPLICAS=$REPLICAS" >> $GITHUB_ENV

      - name: Skip Deploy if not Protected Branch
        if: "!contains(fromJSON(env.PROTECTED_BRANCHES), github.ref_name)"
        run: |
          echo "⚠️  Branch ${{ github.ref_name }} is not in protected list. Skipping deploy."
          exit 0

      - name: Deploy Worker
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-worker
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}_
          command: worker
          replicas: 1

      - name: Deploy App
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-app
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}_
          replicas: ${{ env.REPLICAS }}