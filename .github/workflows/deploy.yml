name: Deploy

on:
  push:
    branches:
      - main
      - master
      - develop
      - sandbox

env:
  ENV_BASE: .env
  REPLICAS_CONFIG: "main:2,sandbox:1"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Laravel Tests
        uses: ./.github/actions/laravel-tests

      # 🔐 SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 🏷️ Nome da imagem
      - name: Set image name
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:$BRANCH_NAME" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:latest" >> $GITHUB_ENV

      # 🏷️ Update version.txt
      - name: Update version.txt with commit hash
        run: |
          echo "${{ github.sha }}" | cut -c1-7 > version.txt
          date +" %Y-%m-%d %H:%M:%S" >> version.txt

      # 🔐 Login Docker Hub
      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 🏗️ Build
      - name: Build da imagem
        run: docker build -t $IMAGE --target app .

      # 🏷️ Tag latest (opcional mas recomendado)
      - name: Tag latest
        run: docker tag $IMAGE $IMAGE_LATEST

      # 📤 Push
      - name: Push da imagem
        run: |
          docker push $IMAGE
          docker push $IMAGE_LATEST

      # 🚀 Deploy no servidor
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 120s
          script: |
            set -e

            BRANCH="${{ env.BRANCH_NAME }}"
            REPO=${{ github.event.repository.name }}
            USER=${{ secrets.DOCKERHUB_USERNAME }}

            APP_NAME="$REPO-$BRANCH"
            IMAGE="$USER/$REPO:$BRANCH"
            ENV_BASE="${{ env.ENV_BASE }}"

            echo "🚀 Deploying $APP_NAME"

            # 🔑 Login no Docker Hub (no servidor)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$USER" --password-stdin

            echo "📦 Baixando imagem..."
            docker pull $IMAGE

            # 🔥 Limpeza opcional (evita encher disco)
            docker image prune -a -f || true

            # Garantir network
            docker network inspect web >/dev/null 2>&1 || docker network create --driver overlay web

            # Resolver ENV
            # O default é o .env, e os arquivos específicos (.env-branch) sobrescrevem as variáveis do .env
            
            ENV_PATH="$HOME/$REPO"
            BASE_ENV="$ENV_PATH/.env"
            BRANCH_ENV="$ENV_PATH/.env-$BRANCH"
            
            # Caso especial: se branch for main ou master e .env-main/.env-master não existir, tentar .env-production
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
                if [ ! -f "$BRANCH_ENV" ]; then
                    echo "🔍 Trying .env-production for main/master..."
                    BRANCH_ENV="$ENV_PATH/.env-production"
                fi
            fi

            # Arquivo final que o container usará
            FINAL_ENV="$ENV_PATH/.env-merged-$BRANCH"

            if [ ! -f "$BASE_ENV" ]; then
              echo "⚠️  Arquivo base $BASE_ENV não encontrado!"
              # Se não tem base, tenta usar o da branch direto se existir
              if [ -f "$BRANCH_ENV" ]; then
                 cp "$BRANCH_ENV" "$FINAL_ENV"
                 echo "✅ Usando apenas o arquivo específico: $BRANCH_ENV"
              else
                 echo "❌ Nenhum arquivo .env ou .env-branch encontrado em $ENV_PATH"
                 exit 1
              fi
            else
              # Se o base existe, mesclamos as variáveis
              echo "📝 Mesclando $BASE_ENV com $BRANCH_ENV..."
              
              if [ -f "$BRANCH_ENV" ]; then
                echo "➕ Mesclando variáveis específicas de $BRANCH_ENV"
                # Usa awk para mesclar os arquivos: variáveis em BRANCH_ENV sobrescrevem BASE_ENV
                # NR==FNR processa o primeiro arquivo (BRANCH_ENV), guarda em a[$1]
                # Depois processa BASE_ENV, se a chave existir em a, imprime o valor de a e deleta de a.
                # Se não existir, imprime a linha original de BASE_ENV.
                # No final, imprime o que sobrou em a (novas chaves de BRANCH_ENV).
                awk -F'=' '
                  NR==FNR { if($1!="") a[$1]=$0; next }
                  { 
                    split($0,parts,"="); 
                    key=parts[1];
                    if(key in a) { print a[key]; delete a[key] } else { print } 
                  }
                  END { for (i in a) print a[i] }
                ' "$BRANCH_ENV" "$BASE_ENV" > "$FINAL_ENV"
                echo "✅ Arquivos mesclados com sucesso."
              else
                echo "ℹ️  Arquivo específico $BRANCH_ENV não encontrado, usando apenas o base."
                cp "$BASE_ENV" "$FINAL_ENV"
              fi
            fi

            echo "🚀 Usando arquivo final: $FINAL_ENV"

            PREFIX="${REPO}-${BRANCH}_"

            # Parse Replicas Config
            REPLICAS=1
            IFS=',' read -ra CONFIG_ARRAY <<< "${{ env.REPLICAS_CONFIG }}"
            for item in "${CONFIG_ARRAY[@]}"; do
              IFS=':' read -ra PAIR <<< "$item"
              if [[ "${PAIR[0]}" == "$BRANCH" ]]; then
                REPLICAS="${PAIR[1]}"
                break
              fi
            done

            echo "🔢 Replicas for $BRANCH: $REPLICAS"

            update_or_create_service() {
              SERVICE_NAME=$1
              COMMAND=$2
              SERVICE_REPLICAS=${3:-$REPLICAS}
              HOST_IP=$(hostname -I | awk '{print $2}')
              echo "🌐 Host IP detectado: $HOST_IP"
            
              if docker service inspect ${SERVICE_NAME} >/dev/null 2>&1; then
                echo "🔄 Atualizando ${SERVICE_NAME}..."
                
                docker service update --force \
                  --image ${IMAGE} \
                  --replicas ${SERVICE_REPLICAS} \
                  --mount-add type=bind,src=${FINAL_ENV},dst=/var/www/html/.env \
                  --env-rm REDIS_PREFIX \
                  --env-rm CACHE_PREFIX \
                  --env-rm SESSION_PREFIX \
                  --env-rm HORIZON_PREFIX \
                  --env-add REDIS_PREFIX=${PREFIX} \
                  --env-add CACHE_PREFIX=${PREFIX}cache \
                  --env-add SESSION_PREFIX=${PREFIX}session \
                  --env-add HORIZON_PREFIX=${PREFIX}horizon: \
                  --update-order start-first \
                  --update-parallelism 1 \
                  --update-delay 3s \
                  ${SERVICE_NAME}
            
              else
                echo "🚀 Criando ${SERVICE_NAME}..."
                
                docker service create \
                  --name ${SERVICE_NAME} \
                  --replicas ${SERVICE_REPLICAS} \
                  --network web \
                  --host host.internal:${HOST_IP} \
                  --mount type=bind,src=${FINAL_ENV},dst=/var/www/html/.env \
                  --env REDIS_PREFIX=${PREFIX} \
                  --env CACHE_PREFIX=${PREFIX}cache \
                  --env SESSION_PREFIX=${PREFIX}session \
                  --env HORIZON_PREFIX=${PREFIX}horizon: \
                  --label prometheus.enable=true \
                  --label prometheus.port=${SERVICE_NAME}:80 \
                  --label prometheus.path=/metrics \
                  --label app=${SERVICE_NAME} \
                  ${IMAGE} ${COMMAND}
                fi
            }

            # --- WORKER ---
            update_or_create_service "${APP_NAME}-worker" "worker" 1

            # --- APP ---
            update_or_create_service "${APP_NAME}-app" ""

            echo "✅ Deploy finalizado: $APP_NAME"