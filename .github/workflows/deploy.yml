name: Deploy

on:
  push:
    branches: [main, sandbox, develop]

  pull_request:
    branches: [main, sandbox, develop]

env:
  REPLICAS_CONFIG: "main:3,sandbox:2"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          BRANCH_NAME=${{ github.ref_name }}
          REPO_NAME=${{ github.event.repository.name }}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/$REPO_NAME:$BRANCH_NAME" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${{ secrets.DOCKERHUB_USERNAME }}/$REPO_NAME:latest" >> $GITHUB_ENV

      - name: Update version.txt
        run: |
          echo "${{ github.sha }}" | cut -c1-7 > version.txt
          date +" %Y-%m-%d %H:%M:%S" >> version.txt

      - name: Docker Setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        run: |
          docker build -t $IMAGE --target app .
          docker tag $IMAGE $IMAGE_LATEST
          docker push $IMAGE
          docker push $IMAGE_LATEST

      - name: Prepare Server Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ env.IMAGE }}
            docker image prune -a -f || true
            docker network inspect web >/dev/null 2>&1 || docker network create --driver overlay web

      - name: Resolve Replicas
        run: |
          REPLICAS=1
          IFS=',' read -ra CONFIG_ARRAY <<< "${{ env.REPLICAS_CONFIG }}"
          for item in "${CONFIG_ARRAY[@]}"; do
            IFS=':' read -ra PAIR <<< "$item"
            if [[ "${PAIR[0]}" == "${{ env.BRANCH_NAME }}" ]]; then
              REPLICAS="${PAIR[1]}"
              break
            fi
          done
          echo "REPLICAS=$REPLICAS" >> $GITHUB_ENV

      - name: Deploy Worker
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-worker
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}_
          command: worker
          replicas: 1

      - name: Deploy App
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-app
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}_
          replicas: ${{ env.REPLICAS }}