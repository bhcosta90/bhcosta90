name: PR Deploy

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  pull-requests: write
  contents: read

env:
  PROTECTED_BRANCHES: '["main", "sandbox", "develop"]'
  ENV_BASE: ${{ github.event.repository.name }}
  DOMAIN_BASE: bhcosta90.dev.br:8080

jobs:
  deploy:
    if: "github.event.action != 'closed' && github.event.pull_request.draft == false && !contains(fromJSON(env.PROTECTED_BRANCHES), github.head_ref)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env
        with:
          ref_name: ${{ github.head_ref }}
          repo_name: ${{ github.event.repository.name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          sha: ${{ github.event.pull_request.head.sha }}
          is_pr: 'true'

      - name: Set PR Specific Vars
        run: |
          echo "DOMAIN=$BRANCH_NAME.preview.${{ env.DOMAIN_BASE }}" >> $GITHUB_ENV

      - name: Docker Setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        uses: ./.github/actions/build-push-image
        with:
          image: ${{ env.IMAGE }}

      - name: Prepare Server Environment
        uses: ./.github/actions/prepare-server-env
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          image: ${{ env.IMAGE }}
          repo_name: ${{ env.REPO_NAME }}
          branch_name: ${{ env.BRANCH_NAME }}
          env_content: ${{ secrets.ENV }}

      - name: Deploy Worker
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-worker
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}_${{ env.BRANCH_NAME }}_
          command: worker
          replicas: 1

      - name: Deploy App
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-app
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}_${{ env.BRANCH_NAME }}_
          replicas: 1

      - name: Update Caddy Config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            DOMAIN="http://${{ env.DOMAIN }}"
            CADDYFILE="$HOME/CaddyfilePreview"
            APP_SERVICE="${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-app"
            if ! grep -q "$DOMAIN" "$CADDYFILE"; then
              echo "$DOMAIN {" >> "$CADDYFILE"
              echo "        reverse_proxy $APP_SERVICE:80" >> "$CADDYFILE"
              echo "}" >> "$CADDYFILE"
              docker service update --force caddy-preview || true
            fi

      - name: Comment on PR
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const domain = "${{ env.DOMAIN }}";
            const message = `🚀 **Preview Environment Available!**\n\n🔗 Link: [http://${domain}](http://${domain})\n\n_This environment will be automatically removed when the PR is closed._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })

  cleanup:
    if: "github.event.action == 'closed' && !contains(fromJSON(env.PROTECTED_BRANCHES), github.head_ref)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env
        with:
          ref_name: ${{ github.head_ref }}
          repo_name: ${{ github.event.repository.name }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          sha: ${{ github.event.pull_request.head.sha }}
          is_pr: 'true'

      - name: Swarm Cleanup
        uses: ./.github/actions/docker-swarm-cleanup
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          app_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}
          domain: ${{ env.BRANCH_NAME }}.preview.${{ env.DOMAIN_BASE }}
          image: ${{ env.IMAGE }}

      - name: Delete image tag from Docker Hub
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' https://hub.docker.com/v2/users/login/ | jq -r .token)
          if [ "$TOKEN" != "null" ]; then
            curl -s -X DELETE -H "Authorization: JWT $TOKEN" https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}/tags/${{ env.BRANCH_NAME }}/
          fi
