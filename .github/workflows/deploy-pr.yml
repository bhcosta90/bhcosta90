name: PR Deploy

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  pull-requests: write
  contents: read

env:
  ENV_BASE: ${{ github.event.repository.name }}
  DOMAIN_BASE: bhcosta90.dev.br:8080

jobs:
  deploy:
    if: |
      github.event.action != 'closed' && 
      github.event.pull_request.draft == false && 
      !contains(fromJSON('["main", "sandbox", "develop"]'), github.head_ref)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          BRANCH_NAME=$(echo "${{ github.head_ref }}" | sed 's/\//-/g')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:$BRANCH_NAME" >> $GITHUB_ENV
          echo "DOMAIN=$BRANCH_NAME.preview.${{ env.DOMAIN_BASE }}" >> $GITHUB_ENV
          echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV

      - name: Update version.txt
        run: |
          echo "$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7) $(date +'%Y-%m-%d %H:%M:%S')" > version.txt

      - name: Docker Setup
        uses: ./.github/actions/docker-setup
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        run: |
          docker build -t $IMAGE --target app .
          docker push $IMAGE

      - name: Prepare Server Environment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ env.IMAGE }}
            docker network inspect web >/dev/null 2>&1 || docker network create web
            
            ENV_DIR="$HOME/${{ env.REPO_NAME }}"
            mkdir -p "$ENV_DIR"
            if [ -n "${{ secrets.ENV }}" ]; then
              echo "${{ secrets.ENV }}" > "$ENV_DIR/.env-${{ env.BRANCH_NAME }}"
            fi

      - name: Deploy Worker
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-worker
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}_${{ env.BRANCH_NAME }}_
          command: worker
          replicas: 1

      - name: Deploy App
        uses: ./.github/actions/docker-swarm-deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          service_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-app
          image: ${{ env.IMAGE }}
          env_file: $HOME/${{ env.REPO_NAME }}/.env-${{ env.BRANCH_NAME }}
          env_dir: $HOME/${{ env.REPO_NAME }}
          prefix: ${{ env.REPO_NAME }}_${{ env.BRANCH_NAME }}_
          replicas: 1

      - name: Update Caddy Config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            DOMAIN="http://${{ env.DOMAIN }}"
            CADDYFILE="$HOME/CaddyfilePreview"
            APP_SERVICE="${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}-app"
            if ! grep -q "$DOMAIN" "$CADDYFILE"; then
              echo "$DOMAIN {" >> "$CADDYFILE"
              echo "        reverse_proxy $APP_SERVICE:80" >> "$CADDYFILE"
              echo "}" >> "$CADDYFILE"
              docker service update --force caddy-preview || true
            fi

      - name: Comment on PR
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const domain = "${{ env.DOMAIN }}";
            const message = `🚀 **Preview Environment Available!**\n\n🔗 Link: [http://${domain}](http://${domain})\n\n_This environment will be automatically removed when the PR is closed._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })

  cleanup:
    if: github.event.action == 'closed' && !contains(fromJSON('["main", "sandbox", "develop"]'), github.head_ref)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set branch name (sanitized)
        run: |
          BRANCH_NAME=$(echo "${{ github.head_ref }}" | sed 's/\//-/g')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV

      - name: Swarm Cleanup
        uses: ./.github/actions/docker-swarm-cleanup
        with:
          host: ${{ secrets.SERVER_HOST }}
          user: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          app_name: ${{ env.REPO_NAME }}-${{ env.BRANCH_NAME }}
          domain: ${{ env.BRANCH_NAME }}.preview.${{ env.DOMAIN_BASE }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:${{ env.BRANCH_NAME }}

      - name: Delete image tag from Docker Hub
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' https://hub.docker.com/v2/users/login/ | jq -r .token)
          if [ "$TOKEN" != "null" ]; then
            curl -s -X DELETE -H "Authorization: JWT $TOKEN" https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}/tags/${{ env.BRANCH_NAME }}/
          fi
