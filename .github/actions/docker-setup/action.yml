name: 'Docker Setup'
description: 'Setup Docker Hub login'
inputs:
  username:
    description: 'Docker Hub username'
    required: true
  token:
    description: 'Docker Hub token'
    required: true

runs:
  using: "composite"
  steps:
    - name: Login to Docker Hub
      shell: bash
      run: echo "${{ inputs.token }}" | docker login -u "${{ inputs.username }}" --password-stdin
