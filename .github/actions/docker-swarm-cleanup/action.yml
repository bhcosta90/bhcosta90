name: 'Docker Swarm Cleanup'
description: 'Cleanup Docker services, images and Caddy config for a branch'
inputs:
  host:
    description: 'Server host'
    required: true
  user:
    description: 'SSH username'
    required: true
  key:
    description: 'SSH key'
    required: true
  app_name:
    description: 'Application name prefix'
    required: true
  domain:
    description: 'Domain to remove from Caddyfile'
    required: true
  image:
    description: 'Docker image to remove'
    required: true

runs:
  using: "composite"
  steps:
    - name: Cleanup via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        script: |
          APP_NAME="${{ inputs.app_name }}"
          DOMAIN="${{ inputs.domain }}"
          IMAGE="${{ inputs.image }}"
          CADDYFILE="$HOME/CaddyfilePreview"

          echo "🧹 Cleaning up $APP_NAME..."
          
          # Remover serviços (Swarm)
          docker service rm "$APP_NAME-app" "$APP_NAME-worker" >/dev/null 2>&1 || true
          
          # Remover imagem
          docker rmi "$IMAGE" >/dev/null 2>&1 || true
          
          # Remover do Caddyfile
          if [ -f "$CADDYFILE" ]; then
            sed -i "/$DOMAIN {/,/}/d" "$CADDYFILE"
            docker service update --force caddy-preview || true
          fi
          
          echo "✅ Cleanup finalizado para $APP_NAME"
