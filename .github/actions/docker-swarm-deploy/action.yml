name: 'Docker Swarm Deploy'
description: 'Update or create a Docker service in Swarm with .env fallback'
inputs:
  host:
    description: 'Server host'
    required: true
  user:
    description: 'SSH username'
    required: true
  key:
    description: 'SSH key'
    required: true
  service_name:
    description: 'Service name'
    required: true
  image:
    description: 'Docker image'
    required: true
  env_file:
    description: 'Primary .env file path'
    required: true
  env_dir:
    description: 'Directory for .env fallback'
    required: true
  prefix:
    description: 'Environment variable prefix'
    required: true
  command:
    description: 'Command to run (e.g. worker)'
    default: ''
  replicas:
    description: 'Number of replicas'
    default: '1'

runs:
  using: "composite"
  steps:
    - name: Deploy Service via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        script: |
          set -e
          
          SERVICE_NAME="${{ inputs.service_name }}"
          IMAGE="${{ inputs.image }}"
          ENV_FILE="${{ inputs.env_file }}"
          ENV_DIR="${{ inputs.env_dir }}"
          PREFIX="${{ inputs.prefix }}"
          COMMAND="${{ inputs.command }}"
          REPLICAS="${{ inputs.replicas }}"
          
          echo "🚀 Deploying $SERVICE_NAME..."

          # --- Resolver ENV com Fallback ---
          # 1. Tentar o arquivo especificado
          # 2. Tentar .env no diretório base
          
          FINAL_ENV="$ENV_FILE"
          
          if [ ! -f "$FINAL_ENV" ]; then
            echo "⚠️  Specific .env not found at $FINAL_ENV"
            echo "🔍 Trying fallback in $ENV_DIR/.env"
            FINAL_ENV="$ENV_DIR/.env"
          fi
          
          if [ ! -f "$FINAL_ENV" ]; then
            echo "❌ No .env file found in $ENV_DIR!"
            exit 1
          fi
          
          echo "✅ Using ENV: $FINAL_ENV"

          # --- Docker Swarm Deploy (Update or Create) ---
          if docker service inspect "$SERVICE_NAME" >/dev/null 2>&1; then
            echo "🔄 Updating $SERVICE_NAME..."
            docker service update --force \
              --image "$IMAGE" \
              --replicas "$REPLICAS" \
              --mount-add type=bind,src="$FINAL_ENV",dst=/var/www/html/.env \
              --env-rm REDIS_PREFIX \
              --env-rm CACHE_PREFIX \
              --env-rm SESSION_PREFIX \
              --env-rm HORIZON_PREFIX \
              --env-rm APP_NAME \
              --env-add REDIS_PREFIX="$PREFIX" \
              --env-add CACHE_PREFIX="${PREFIX}cache" \
              --env-add SESSION_PREFIX="${PREFIX}session" \
              --env-add HORIZON_PREFIX="${PREFIX}horizon:" \
              --env-add APP_NAME="$SERVICE_NAME" \
              --update-order start-first \
              "$SERVICE_NAME"
          else
            echo "🚀 Creating $SERVICE_NAME..."
            docker service create \
              --name "$SERVICE_NAME" \
              --replicas "$REPLICAS" \
              --network web \
              --host host.docker.internal:host-gateway \
              --mount type=bind,src="$FINAL_ENV",dst=/var/www/html/.env \
              --env REDIS_PREFIX="$PREFIX" \
              --env CACHE_PREFIX="${PREFIX}cache" \
              --env SESSION_PREFIX="${PREFIX}session" \
              --env HORIZON_PREFIX="${PREFIX}horizon:" \
              --env APP_NAME="$SERVICE_NAME" \
              "$IMAGE" $COMMAND
          fi
