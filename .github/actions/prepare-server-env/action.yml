name: 'Prepare Server Env'
description: 'Docker login, pull image and create web network on server'
inputs:
  host:
    description: 'Server host'
    required: true
  user:
    description: 'SSH username'
    required: true
  key:
    description: 'SSH key'
    required: true
  dockerhub_username:
    description: 'Docker Hub Username'
    required: true
  dockerhub_token:
    description: 'Docker Hub Token'
    required: true
  image:
    description: 'Docker image to pull'
    required: true
  repo_name:
    description: 'Repository name for .env directory'
    required: true
  branch_name:
    description: 'Branch name for .env suffix'
    required: true
  env_content:
    description: 'Optional content for .env file (from secrets.ENV)'
    default: ''

runs:
  using: "composite"
  steps:
    - name: Run Preparation via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        script: |
          set -e
          echo "${{ inputs.dockerhub_token }}" | docker login -u "${{ inputs.dockerhub_username }}" --password-stdin
          docker pull ${{ inputs.image }}
          docker network inspect web >/dev/null 2>&1 || docker network create --driver overlay web
          
          ENV_DIR="$HOME/${{ inputs.repo_name }}"
          mkdir -p "$ENV_DIR"
          
          if [ -n "${{ inputs.env_content }}" ]; then
            echo "${{ inputs.env_content }}" > "$ENV_DIR/.env-${{ inputs.branch_name }}"
          fi
