name: 'Laravel Tests'
description: 'Runs Laravel tests (Composer CI)'

runs:
  using: "composite"
  steps:
    - name: Setup PHP with Extensions and Tools
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, bcmath, openssl, pdo, tokenizer, xml, ctype, json, curl
        tools: composer

    - name: Copy .env if not exists
      shell: bash
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Composer Dependencies
      shell: bash
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate Application Key
      shell: bash
      run: php artisan key:generate

    - name: Set Directory Permissions
      shell: bash
      run: chmod -R 777 storage bootstrap/cache

    - name: Create SQLite Database
      shell: bash
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Tests (PHPUnit or Pest)
      shell: bash
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: composer ci
